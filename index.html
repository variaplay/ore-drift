<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <title>Ore Drift</title>
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #05060c;
        overflow: hidden;
        width: 100%;
        height: 100%;
        touch-action: none;
        overscroll-behavior: none;
        -webkit-user-select: none;
        user-select: none;
      }
      #game {
        position: fixed;
        inset: 0;
      }
      .hint {
        position: fixed;
        left: 50%;
        bottom: 24px;
        transform: translateX(-50%);
        color: #8ea1c7;
        font: 12px/1.4 -apple-system, system-ui, sans-serif;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        pointer-events: none;
        opacity: 0.7;
      }
      .site-footer {
        position: fixed;
        right: 16px;
        bottom: 10px;
        font: 11px/1.4 -apple-system, system-ui, sans-serif;
        color: rgba(142, 161, 199, 0.55);
        letter-spacing: 0.04em;
        z-index: 10;
      }
      /* footer is only visible on the title screen; once we're in-game it
         overlaps the minimap, so the TitleScene/GameScene toggle body.in-game */
      body.in-game .site-footer { display: none; }
      .site-footer a {
        color: inherit;
        text-decoration: none;
        padding: 2px 4px;
      }
      .site-footer a:hover {
        color: #7df9ff;
      }
      .site-footer .sep { opacity: 0.4; padding: 0 2px; }
    </style>
  </head>
  <body>
    <div id="game"></div>
    <div class="hint">Drag to steer &nbsp;·&nbsp; Hold to boost</div>
    <div class="site-footer">
      <a href="about.html">About</a><span class="sep">·</span><a href="privacy.html">Privacy</a><span class="sep">·</span><a href="terms.html">Terms</a>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/phaser@3.80.1/dist/phaser.min.js"></script>
    <script type="module" src="./src/main.js"></script>
  </body>
</html>
